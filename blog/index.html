<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog · Arthur Gaspar</title>
    <meta name="description" content="Artigos e reflexões de Arthur Gaspar sobre química, programação, ciência e mais.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23009aa6'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' font-family='sans-serif' fill='white'>A</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="blog.css">
</head>
<body>

    <nav class="b-nav">
        <a class="b-nav-brand" href="../index.html">Arthur Gaspar</a>
        <div class="b-nav-links">
            <a href="../index.html">← Início</a>
        </div>
    </nav>

    <main class="b-main">

        <header style="margin-bottom: 3rem;">
            <span class="b-eyebrow">BLOG</span>
            <h1 class="b-title">Artigos</h1>
            <p class="b-desc">Química, programação, ciência e o que mais me interessar.</p>
        </header>

        <div class="b-grid" id="post-list"></div>
        <p class="b-empty" id="empty-msg" hidden>Nenhum artigo por aqui ainda.</p>

    </main>

    <!-- posts.js define a variável POSTS — funciona com file:// e http:// -->
    <script src="posts.js"></script>
    <script>
        const grid  = document.getElementById('post-list');
        const empty = document.getElementById('empty-msg');

        if (!POSTS || !POSTS.length) {
            empty.hidden = false;
        } else {
            POSTS.forEach(p => {
                const a = document.createElement('a');
                a.className = 'b-card';
                a.href = 'posts/' + p.slug + '.html';
                a.innerHTML =
                    '<p class="b-card-title">' + p.title + '</p>' +
                    '<p class="b-card-desc">'  + p.desc  + '</p>' +
                    '<span class="b-date">'    + p.date  + '</span>';
                grid.appendChild(a);
            });
        }
    </script>

</body>
</html>
