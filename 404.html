<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 ‚Äî P√°gina n√£o encontrada ¬∑ Arthur Gaspar</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23009aa6'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' font-family='sans-serif' fill='white'>A</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Courier+Prime&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/86ad24bcb9.js" crossorigin="anonymous"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e7e7e7;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .error-code {
            font-family: 'Courier Prime', monospace;
            font-size: 6rem;
            font-weight: 700;
            color: #009aa6;
            line-height: 1;
            letter-spacing: -0.04em;
            opacity: 0.9;
            text-shadow: 0 0 40px rgba(0,154,166,0.3);
        }

        .error-icon {
            font-size: 2rem;
            color: #2a2a2a;
        }

        .error-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ddd;
            letter-spacing: -0.02em;
        }

        .error-desc {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.7;
            max-width: 300px;
        }

        .error-formula {
            font-family: 'Courier Prime', monospace;
            font-size: 0.78rem;
            color: #333;
            padding: 8px 16px;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            background: #0d0d0d;
            letter-spacing: 0.02em;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 8px;
            border: 1px solid rgba(0,154,166,0.4);
            background: rgba(0,154,166,0.08);
            color: #009aa6;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            margin-top: 0.4rem;
        }

        .btn-home:hover {
            background: rgba(0,154,166,0.14);
            border-color: #009aa6;
        }

        .btn-home:focus-visible { outline: 2px solid #009aa6; outline-offset: 2px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <div class="container">
        <p class="error-code">404</p>
        <i class="fa-solid fa-flask-vial error-icon" aria-hidden="true"></i>
        <h1 class="error-title">P√°gina n√£o encontrada</h1>
        <p class="error-desc">
            Essa URL n√£o existe no meu site ‚Äî talvez tenha sido movida, deletada,
            ou voc√™ digitou algo errado.
        </p>
        <span class="error-formula">ERROR: page_not_found = null</span>
        <a class="btn-home" href="/">
            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
            Voltar ao in√≠cio
        </a>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);

            const CHEM  = ['H‚ÇÇO','CO‚ÇÇ','C‚ÇÜH‚ÇÜ','CH‚ÇÑ','NaCl','H‚ÇÇSO‚ÇÑ','O‚ÇÇ','N‚ÇÇ','NH‚ÇÉ'];
            const CODE  = ['def','import','class','{}','[]','//','const','return','404','null','void','</>'];
            const MATH  = ['‚àë','Œî','‚àû','‚â°','‚à´','œÄ','‚àö','‚àÇ'];

            function rand(a, b) { return a + Math.random() * (b - a); }
            function pick(arr)  { return arr[Math.floor(Math.random() * arr.length)]; }

            function mkParticle(scatter) {
                const roll = Math.random();
                let type, text, color;
                if      (roll < 0.3)  { type = 'chem'; text = pick(CHEM); color = '#009aa6'; }
                else if (roll < 0.65) { type = 'code'; text = pick(CODE); color = '#7c3aed'; }
                else if (roll < 0.80) { type = 'math'; text = pick(MATH); color = '#009aa6'; }
                else                  { type = 'benz'; text = null;       color = '#009aa6'; }
                return {
                    x: rand(0, canvas.width),
                    y: scatter ? rand(-canvas.height, canvas.height) : canvas.height + rand(10,60),
                    vy: -rand(0.18, 0.48), vx: (Math.random()-0.5)*0.22,
                    opacity: rand(0.05, 0.16), fontSize: rand(11, 17),
                    size: rand(10, 18), type, text, color,
                    wobble: rand(0, Math.PI*2), wobbleSpeed: rand(0.008, 0.02), wobbleAmp: rand(0.15, 0.65),
                };
            }

            const particles = Array.from({ length: 50 }, () => mkParticle(true));

            function drawBenzene(p) {
                ctx.save();
                ctx.globalAlpha = p.opacity; ctx.strokeStyle = p.color; ctx.lineWidth = 1;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = (i * Math.PI / 3) - Math.PI / 6;
                    i === 0 ? ctx.moveTo(p.x + p.size*Math.cos(a), p.y + p.size*Math.sin(a))
                            : ctx.lineTo(p.x + p.size*Math.cos(a), p.y + p.size*Math.sin(a));
                }
                ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.5, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            }

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const p of particles) {
                    p.wobble += p.wobbleSpeed;
                    p.x += p.vx + Math.sin(p.wobble) * p.wobbleAmp;
                    p.y += p.vy;
                    if (p.y < -40)                Object.assign(p, mkParticle(false));
                    if (p.x < -30)                p.x = canvas.width + 10;
                    if (p.x > canvas.width + 30)  p.x = -10;
                    if (p.type === 'benz') {
                        drawBenzene(p);
                    } else {
                        ctx.save();
                        ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
                        ctx.font = p.type === 'code'
                            ? `${p.fontSize}px "Courier Prime","Courier New",monospace`
                            : `${p.fontSize}px Inter,sans-serif`;
                        ctx.fillText(p.text, p.x, p.y);
                        ctx.restore();
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();
        })();
    </script>
</body>
</html>
